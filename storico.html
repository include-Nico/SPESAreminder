<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Storico SP€SA!</title>
    <meta name="theme-color" content="#373b44">
    <link rel="apple-touch-icon" href="icons/icon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/glass.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button id="back-btn" class="icon-btn">🔙</button>
            <div>
                <h1 style="font-size: 2rem;">Storico 📊</h1>
                <p class="subtitle">Le tue statistiche</p>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="stat-card glass-panel">
                <h4>Spesa Mensile</h4>
                <h2 id="mese-totale">0.00 €</h2>
                <p id="mese-nome">Caricamento...</p>
            </div>
            <div class="stat-card glass-panel">
                <h4>Supermercato Top</h4>
                <h2 id="top-supermercato">-</h2>
                <p id="top-spesa">0.00 € totali</p>
            </div>
        </div>

        <div class="chart-wrapper glass-panel">
            <div class="chart-header">
                <h3>Andamento Spese</h3>
                <select id="chart-period" class="glass-select">
                    <option value="mensile">Ultimi 6 Mesi</option>
                </select>
            </div>
            <canvas id="expenseChart"></canvas>
        </div>

        <div class="filters-container glass-panel" style="display: flex; gap: 10px; margin-bottom: 20px; padding: 12px; border-radius: 15px;">
            <input type="text" id="filter-text" placeholder="Cerca supermercato..." class="glass-select" style="flex: 1; padding: 8px;">
            <select id="sort-order" class="glass-select" style="padding: 8px;">
                <option value="recenti">Recenti</option>
                <option value="prezzo-alto">Prezzo Alto</option>
                <option value="prezzo-basso">Prezzo Basso</option>
            </select>
        </div>

        <h3 class="section-title">Ultime Spese Registrate</h3>
        <ul id="history-list" class="history-list">
            <li style="justify-content: center; opacity: 0.7;">Scaricamento dati... ⏳</li>
        </ul>
    </div>

    <div id="custom-modal" class="modal-overlay hidden" style="z-index: 2000;">
        <div class="modal-content glass-panel">
            <h3 id="modal-title">Attenzione</h3>
            <p id="modal-message">Messaggio</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="modal-btn secondary-btn">Annulla</button>
                <button id="modal-confirm" class="modal-btn danger-btn">Elimina</button>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="modal-overlay hidden" style="z-index: 1000;">
        <div class="modal-content glass-panel" style="max-height: 90vh; overflow-y: auto;">
            <h3 id="detail-title">Dettaglio Spesa</h3>
            <div id="detail-content" style="text-align: left; margin: 15px 0; font-size: 0.95rem; color: #333;"></div>
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="detail-close" class="modal-btn secondary-btn">Chiudi</button>
                <button id="detail-delete" class="modal-btn danger-btn">Elimina Spesa</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(r) { for(let reg of r) { reg.unregister(); } });
        }
    </script>
    <script type="module" src="js/storico.js"></script>
</body>
</html>
